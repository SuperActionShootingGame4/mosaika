name: Build Windows Executables

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.spec'
      - 'requirements.txt'
      - '.github/workflows/build_windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install -r requirements.txt
          .venv\Scripts\pip install pyinstaller

      - name: Download NudeNet model (640m.onnx)
        shell: python
        run: |
          import os, sys, shutil
          from pathlib import Path

          dest = Path("640m.onnx")
          if dest.exists():
              print("640m.onnx already present")
              sys.exit(0)

          # NudeDetector() without model_path triggers auto-download
          try:
              from nudenet import NudeDetector
              _d = NudeDetector()
          except Exception as e:
              print(f"Init attempt: {e}")

          # Search known locations
          search_roots = [
              Path(os.environ.get("APPDATA", "")) / "nudenet",
              Path.home() / ".nudenet",
              Path.home() / ".cache" / "nudenet",
          ]
          import nudenet
          search_roots.insert(0, Path(nudenet.__file__).parent)

          for root in search_roots:
              for p in root.rglob("*.onnx"):
                  shutil.copy(p, dest)
                  print(f"Copied model from {p}")
                  sys.exit(0)

          print("ERROR: 640m.onnx not found after download attempt")
          sys.exit(1)

      - name: Build mosaika-editor (GUI)
        run: .venv\Scripts\python -m PyInstaller --noconfirm --clean mosaika_editor.spec

      - name: Build mosaika-cli (CLI)
        run: .venv\Scripts\python -m PyInstaller --noconfirm --clean mosaika_cli.spec

      - name: Copy NudeNet model to dist folders
        run: |
          copy 640m.onnx dist\mosaika-editor\
          copy 640m.onnx dist\mosaika-cli\

      - name: Upload mosaika-editor artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosaika-editor-windows
          path: dist/mosaika-editor/
          retention-days: 30

      - name: Upload mosaika-cli artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosaika-cli-windows
          path: dist/mosaika-cli/
          retention-days: 30
