name: Build Windows Executables

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.spec'
      - 'requirements.txt'
      - '.github/workflows/build_windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install --no-cache-dir -r requirements.txt
          .venv\Scripts\pip install --no-cache-dir pyinstaller

      - name: Ensure nudenet is installed
        run: .venv\Scripts\pip install --no-cache-dir "nudenet>=3.4.0"

      - name: Verify nudenet is installed
        run: .venv\Scripts\python -c "from nudenet import NudeDetector; print('nudenet OK')"

      - name: Verify PyQt6 is installed and importable
        run: |
          .venv\Scripts\pip show PyQt6
          .venv\Scripts\python -c "from PyQt6.QtWidgets import QApplication; print('PyQt6 OK')"

      - name: Show collect_all result for PyQt6 (debug)
        run: .venv\Scripts\python ci_debug_pyqt6.py

      - name: Show installed packages (debug)
        run: .venv\Scripts\pip list

      - name: Prepare NudeNet model (640m.onnx)
        run: .venv\Scripts\python ci_prepare_model.py

      - name: Verify 640m.onnx
        run: |
          if (!(Test-Path "640m.onnx")) { Write-Error "640m.onnx missing"; exit 1 }
          $size = (Get-Item "640m.onnx").length
          Write-Host "640m.onnx: $size bytes"
        shell: pwsh

      - name: Build mosaika-editor (GUI)
        run: .venv\Scripts\python -m PyInstaller --noconfirm --clean mosaika_editor.spec

      - name: Copy PyQt6 into _internal/ (PyInstaller収集をバイパス)
        shell: pwsh
        run: |
          $site = (& .venv\Scripts\python -c "import site; print(site.getsitepackages()[0])")
          Write-Host "site-packages: $site"
          $dst = "dist\mosaika-editor\_internal\PyQt6"
          Copy-Item "$site\PyQt6" $dst -Recurse -Force
          Write-Host "Copied PyQt6 -> $dst"
          Get-ChildItem $dst | Select-Object -First 10 | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Build mosaika-cli (CLI)
        run: .venv\Scripts\python -m PyInstaller --noconfirm --clean mosaika_cli.spec

      - name: Combine into dist/mosaika/
        shell: pwsh
        run: |
          Rename-Item dist\mosaika-editor mosaika
          Copy-Item dist\mosaika-cli\mosaika-cli.exe dist\mosaika\
          Copy-Item 640m.onnx dist\mosaika\

      - name: Upload mosaika
        uses: actions/upload-artifact@v4
        with:
          name: mosaika-windows
          path: dist/mosaika/
          retention-days: 30
